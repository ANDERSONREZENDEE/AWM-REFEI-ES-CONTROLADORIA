<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWM REFEIÇÕES - WM Construções</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#002D5B">
    
    <style>
        :root {
            --azul-wm: #002D5B;
            --laranja-wm: #F2A900;
            --cinza-fundo: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--cinza-fundo);
            margin: 0;
            display: flex;
            justify-content: center;
            border-left: 10px solid var(--laranja-wm);
            border-right: 10px solid var(--laranja-wm);
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Cabeçalho conforme o print */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #ddd;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .logo-wm { width: 100px; }
        .logo-35 { width: 50px; }
        
        .stamp {
            border: 2px solid #555;
            padding: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 10px;
            background: #eee;
            color: #333;
        }

        .title {
            text-align: center;
            color: var(--laranja-wm);
            font-weight: bold;
            font-size: 1.2rem;
            margin: 15px 0;
        }

        /* Card de Contador */
        .counter-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }

        .counter-card h2 { margin: 0; font-size: 24px; color: #333; }
        .counter-card p { margin: 5px 0 0; font-size: 14px; color: #777; }

        /* Estilo do Formulário */
        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
            color: #444;
        }

        .save-box {
            display: flex;
            align-items: center;
            font-size: 12px;
            background: #e8f5e9;
            padding: 2px 5px;
            border-radius: 4px;
            border: 1px solid #c8e6c9;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-enviar {
            width: 100%;
            padding: 15px;
            background-color: var(--azul-wm);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-enviar:active { background-color: #001a35; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="LOGOTIPO.jpg" alt="WM" class="logo-wm">
        <img src="Captura%20de%20tela%202026-02-13%20132630.jpg" alt="35 anos" class="logo-35" onerror="this.style.display='none'">
        <div class="stamp">
            ANDERSON REZENDE<br>
            SETOR DE CONTROLADORIA
        </div>
    </div>

    <div class="title">🍴 AWM REFEIÇÕES 🍴</div>

    <div class="counter-card">
        <h2 id="total-contagem">0 Refeições Registradas</h2>
        <p>(Neste dispositivo)</p>
    </div>

    <form id="form-refeicao">
        <div class="form-group">
            <div class="label-row">
                <label>Nome completo: <span style="color:red">*</span></label>
                <div class="save-box">
                    <input type="checkbox" id="chk_nome" style="width:auto; margin-right:5px;"> ✅ Salvar
                </div>
            </div>
            <input type="text" id="nome" placeholder="Digite o nome completo" required>
        </div>

        <div class="form-group">
            <div class="label-row">
                <label>CPF: <span style="color:red">*</span></label>
                <div class="save-box">
                    <input type="checkbox" id="chk_cpf" style="width:auto; margin-right:5px;"> ✅ Salvar
                </div>
            </div>
            <input type="text" id="cpf" placeholder="000.000.000-00" required maxlength="14">
        </div>

        <div class="form-group">
            <div class="label-row">
                <label>Empresa: <span style="color:red">*</span></label>
                <div class="save-box">
                    <input type="checkbox" id="chk_empresa" style="width:auto; margin-right:5px;"> ✅ Salvar
                </div>
            </div>
            <select id="empresa" required>
                <option value="">--- Selecione na lista ---</option>
                <option value="WM Construções e Montagens">WM Construções e Montagens</option>
                <option value="Terceirizado">Terceirizado</option>
            </select>
        </div>

        <div class="form-group">
            <div class="label-row">
                <label>Função: <span style="color:red">*</span></label>
                <div class="save-box">
                    <input type="checkbox" id="chk_funcao" style="width:auto; margin-right:5px;"> ✅ Salvar
                </div>
            </div>
            <input type="text" id="funcao" placeholder="Digite sua função" required>
        </div>

        <div class="form-group">
            <div class="label-row">
                <label>Obra: <span style="color:red">*</span></label>
                <div class="save-box">
                    <input type="checkbox" id="chk_obra" style="width:auto; margin-right:5px;"> ✅ Salvar
                </div>
            </div>
            <select id="obra" required>
                <option value="">--- Selecione na lista ---</option>
                <option value="Boquira/BA">Boquira/BA</option>
                <option value="Brumado/BA">Brumado/BA</option>
                <option value="Ribeirão/SP">Ribeirão/SP</option>
            </select>
        </div>

        <div class="form-group">
            <div class="label-row">
                <label>Restaurante: <span style="color:red">*</span></label>
                <div class="save-box">
                    <input type="checkbox" id="chk_restaurante" style="width:auto; margin-right:5px;"> ✅ Salvar
                </div>
            </div>
            <select id="restaurante" required>
                <option value="">--- Selecione na lista ---</option>
                <option value="Restaurante Mangai">Restaurante Mangai</option>
                <option value="Cantina Interna">Cantina Interna</option>
            </select>
        </div>

        <div class="form-group">
            <label>Refeição: <span style="color:red">*</span></label>
            <select id="refeicao" required>
                <option value="">--- Selecione ---</option>
                <option value="Café">Café</option>
                <option value="Almoço">Almoço</option>
                <option value="Janta">Janta</option>
            </select>
        </div>

        <button type="submit" class="btn-enviar">REGISTRAR REFEIÇÃO</button>
    </form>
</div>

<script>
    // 1. REGISTRO DO SERVICE WORKER
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("Service Worker Ativo (v3)"))
        .catch(err => console.log("Erro no SW:", err));
    }

    // 2. LÓGICA DE PERSISTÊNCIA OFFLINE (LOCALSTORAGE)
    document.addEventListener("DOMContentLoaded", function() {
        const campos = [
            { id: 'nome', chk: 'chk_nome' },
            { id: 'cpf', chk: 'chk_cpf' },
            { id: 'empresa', chk: 'chk_empresa' },
            { id: 'funcao', chk: 'chk_funcao' },
            { id: 'obra', chk: 'chk_obra' },
            { id: 'restaurante', chk: 'chk_restaurante' }
        ];

        campos.forEach(item => {
            const inputEl = document.getElementById(item.id);
            const checkEl = document.getElementById(item.chk);

            // Carrega o que estiver salvo
            const salvo = localStorage.getItem("val_" + item.id);
            const manter = localStorage.getItem("manter_" + item.chk) === "true";

            if (salvo && manter) {
                inputEl.value = salvo;
                checkEl.checked = true;
            }

            // Salva enquanto digita
            inputEl.addEventListener("input", () => {
                if (checkEl.checked) localStorage.setItem("val_" + item.id, inputEl.value);
            });

            // Monitora o Checkbox
            checkEl.addEventListener("change", () => {
                localStorage.setItem("manter_" + item.chk, checkEl.checked);
                if (checkEl.checked) {
                    localStorage.setItem("val_" + item.id, inputEl.value);
                } else {
                    localStorage.removeItem("val_" + item.id);
                }
            });
        });

        // 3. MÁSCARA DO CPF (000.000.000-00)
        const cpfInput = document.getElementById('cpf');
        cpfInput.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = v;
            
            if (document.getElementById('chk_cpf').checked) {
                localStorage.setItem("val_cpf", v);
            }
        });

        // 4. SIMULAÇÃO DE ENVIO
        document.getElementById('form-refeicao').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Refeição registrada com sucesso!");
        });
    });
</script>

</body>
</html>
