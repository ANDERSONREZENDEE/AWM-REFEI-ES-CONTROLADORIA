<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWM REFEIÇÕES - WM Construções</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#002D5B">
    <style>
        :root {
            --azul-wm: #002D5B;
            --laranja-wm: #F2A900;
            --cinza-fundo: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--cinza-fundo);
            margin: 0;
            display: flex;
            justify-content: center;
            border-left: 12px solid var(--laranja-wm);
            border-right: 12px solid var(--laranja-wm);
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* Cabeçalho */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-wm { width: 90px; }
        .logo-35 { width: 45px; }

        .stamp {
            border: 2px solid #666;
            padding: 4px 8px;
            text-align: center;
            font-weight: bold;
            font-size: 11px;
            background: #f0f0f0;
            color: #222;
            line-height: 1.2;
        }

        .app-title {
            text-align: center;
            color: var(--laranja-wm);
            font-weight: bold;
            font-size: 1.1rem;
            margin: 15px 0;
            text-transform: uppercase;
        }

        /* Contador */
        .counter-box {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            padding: 15px;
            margin-bottom: 20px;
        }
        .counter-box h2 { margin: 0; font-size: 22px; color: #333; }
        .counter-box p { margin: 2px 0 0; font-size: 13px; color: #888; }

        /* Formulário */
        .form-row { margin-bottom: 15px; }
        
        .label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        label { font-weight: bold; font-size: 14px; color: #444; }

        .save-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid #c8e6c9;
        }

        input, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fafafa;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--azul-wm);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .submit-btn:active { background-color: #001a35; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo-box">
            <img src="LOGOTIPO.jpg" alt="WM" class="logo-wm">
            <img src="Captura%20de%20tela%202026-02-13%20132630.jpg" alt="35 anos" class="logo-35">
        </div>
        <div class="stamp">
            ANDERSON REZENDE<br>
            SETOR DE CONTROLADORIA
        </div>
    </header>

    <div class="app-title">🍴 AWM REFEIÇÕES 🍴</div>

    <div class="counter-box">
        <h2 id="display-contagem">0 Refeições Registradas</h2>
        <p>(Neste dispositivo)</p>
    </div>

    <form id="mealForm">
        <div class="form-row">
            <div class="label-container">
                <label>Nome completo: <span style="color:red">*</span></label>
                <div class="save-indicator">
                    <input type="checkbox" id="chk_nome" style="width:auto;"> ✅ Salvar
                </div>
            </div>
            <input type="text" id="nome" placeholder="Digite o nome completo" required>
        </div>

        <div class="form-row">
            <div class="label-container">
                <label>CPF: <span style="color:red">*</span></label>
                <div class="save-indicator">
                    <input type="checkbox" id="chk_cpf" style="width:auto;"> ✅ Salvar
                </div>
            </div>
            <input type="text" id="cpf" placeholder="000.000.000-00" required maxlength="14">
        </div>

        <div class="form-row">
            <div class="label-container">
                <label>Empresa: <span style="color:red">*</span></label>
                <div class="save-indicator">
                    <input type="checkbox" id="chk_empresa" style="width:auto;"> ✅ Salvar
                </div>
            </div>
            <select id="empresa" required>
                <option value="">--- Selecione na lista ---</option>
                <option value="WM Construções e Montagens">WM Construções e Montagens</option>
                <option value="Terceirizado">Terceirizado</option>
            </select>
        </div>

        <div class="form-row">
            <div class="label-container">
                <label>Função (Digite para buscar): <span style="color:red">*</span></label>
                <div class="save-indicator">
                    <input type="checkbox" id="chk_funcao" style="width:auto;"> ✅ Salvar
                </div>
            </div>
            <input type="text" id="funcao" placeholder="Ex: Armador" required>
        </div>

        <div class="form-row">
            <div class="label-container">
                <label>Obra: <span style="color:red">*</span></label>
                <div class="save-indicator">
                    <input type="checkbox" id="chk_obra" style="width:auto;"> ✅ Salvar
                </div>
            </div>
            <select id="obra" required>
                <option value="">--- Selecione na lista ---</option>
                <option value="Boquira/BA">Boquira/BA</option>
                <option value="Brumado/BA">Brumado/BA</option>
                <option value="Cachoeirinha/PE">Cachoeirinha/PE</option>
                <option value="Ribeirão/SP">Ribeirão/SP</option>
            </select>
        </div>

        <div class="form-row">
            <div class="label-container">
                <label>Restaurante: <span style="color:red">*</span></label>
                <div class="save-indicator">
                    <input type="checkbox" id="chk_restaurante" style="width:auto;"> ✅ Salvar
                </div>
            </div>
            <select id="restaurante" required>
                <option value="">--- Selecione na lista ---</option>
                <option value="Restaurante Mangai">Restaurante Mangai</option>
                <option value="Cantina Interna">Cantina Interna</option>
            </select>
        </div>

        <div class="form-row">
            <label>Refeição: <span style="color:red">*</span></label>
            <select id="refeicao" required>
                <option value="">--- Selecione ---</option>
                <option value="Café">Café</option>
                <option value="Almoço">Almoço</option>
                <option value="Jantar">Jantar</option>
            </select>
        </div>

        <button type="submit" class="submit-btn">REGISTRAR REFEIÇÃO</button>
    </form>
</div>

<script>
    // Registro do Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("SW v4 ativo"))
        .catch(err => console.log("Erro SW:", err));
    }

    document.addEventListener("DOMContentLoaded", function() {
        const fields = [
            { id: 'nome', chk: 'chk_nome' },
            { id: 'cpf', chk: 'chk_cpf' },
            { id: 'empresa', chk: 'chk_empresa' },
            { id: 'funcao', chk: 'chk_funcao' },
            { id: 'obra', chk: 'chk_obra' },
            { id: 'restaurante', chk: 'chk_restaurante' }
        ];

        // Carregar dados salvos offline
        fields.forEach(item => {
            const inputEl = document.getElementById(item.id);
            const checkEl = document.getElementById(item.chk);
            
            const savedValue = localStorage.getItem("wm_val_" + item.id);
            const shouldKeep = localStorage.getItem("wm_keep_" + item.chk) === "true";

            if (savedValue && shouldKeep) {
                inputEl.value = savedValue;
                checkEl.checked = true;
            }

            inputEl.addEventListener("input", () => {
                if (checkEl.checked) localStorage.setItem("wm_val_" + item.id, inputEl.value);
            });

            checkEl.addEventListener("change", () => {
                localStorage.setItem("wm_keep_" + item.chk, checkEl.checked);
                if (checkEl.checked) {
                    localStorage.setItem("wm_val_" + item.id, inputEl.value);
                } else {
                    localStorage.removeItem("wm_val_" + item.id);
                }
            });
        });

        // Máscara de CPF
        const cpfInput = document.getElementById('cpf');
        cpfInput.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = v;
            if (document.getElementById('chk_cpf').checked) {
                localStorage.setItem("wm_val_cpf", v);
            }
        });

        // Envio do formulário
        document.getElementById('mealForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Registro realizado com sucesso!");
        });
    });
</script>

</body>
</html>
